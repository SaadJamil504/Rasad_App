openapi: 3.0.3
info:
  title: Rasad API
  version: 1.0.0
  description: Milk Delivery Management System API
paths:
  /api/accounts/adjustments/action/{id}/:
    post:
      operationId: accounts_adjustments_action_create
      description: Driver accepts or rejects an adjustment request.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryAdjustment'
          description: ''
  /api/accounts/adjustments/create/:
    post:
      operationId: accounts_adjustments_create_create
      description: Customer creates a pause or quantity change request.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryAdjustment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeliveryAdjustment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeliveryAdjustment'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryAdjustment'
          description: ''
  /api/accounts/adjustments/list/:
    get:
      operationId: accounts_adjustments_list_list
      description: List adjustment requests. Drivers see for their route, Owners see
        for all their customers.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryAdjustment'
          description: ''
  /api/accounts/alerts/:
    get:
      operationId: accounts_alerts_retrieve
      description: Get overdue customers and today's paused deliveries for owner.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/collection-stats/:
    get:
      operationId: accounts_collection_stats_retrieve
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/accounts/dashboard/alerts/:
    get:
      operationId: accounts_dashboard_alerts_retrieve
      description: Get overdue customers and today's paused deliveries for owner.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/dashboard/reports/:
    get:
      operationId: accounts_dashboard_reports_retrieve
      description: Get an analytical report for the owner including total milk, revenue
        and chart data.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/dashboard/stats/:
    get:
      operationId: accounts_dashboard_stats_retrieve
      description: Get summary stats for the owner's dashboard.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/deliveries/daily/:
    get:
      operationId: accounts_deliveries_daily_list
      description: Get today's deliveries for the driver's route. Creates them if
        they don't exist.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Delivery'
          description: ''
  /api/accounts/deliveries/history/:
    get:
      operationId: accounts_deliveries_history_list
      description: Get full delivery history for the user.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Delivery'
          description: ''
  /api/accounts/deliveries/status/:
    get:
      operationId: accounts_deliveries_status_retrieve
      description: Get today's delivery status for the current customer.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Delivery'
          description: ''
  /api/accounts/deliveries/toggle/{id}/:
    post:
      operationId: accounts_deliveries_toggle_create
      description: Toggle the delivery status for a specific customer today.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Delivery'
          description: ''
  /api/accounts/deliveries/update/{id}/:
    patch:
      operationId: accounts_deliveries_update_partial_update
      description: Driver manually updates delivery quantity for a customer today.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDelivery'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDelivery'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDelivery'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Delivery'
          description: ''
  /api/accounts/invitations/:
    get:
      operationId: accounts_invitations_list
      description: List all invitations sent by the owner.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
          description: ''
    post:
      operationId: accounts_invitations_create
      description: Invite a new Driver or Customer.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invitation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Invitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Invitation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/accounts/invitations/signup/:
    post:
      operationId: accounts_invitations_signup_create
      description: Register a new user using an invitation token.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationSignup'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationSignup'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationSignup'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/accounts/invitations/validate/{token}/:
    get:
      operationId: accounts_invitations_validate_retrieve
      description: Validate an invitation token.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - accounts
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: Login with username and password and receive JWT tokens.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/accounts/login/refresh/:
    post:
      operationId: accounts_login_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/accounts/password-reset/:
    post:
      operationId: accounts_password_reset_create
      description: Request a password reset. Returns UID and Token (Simulating email).
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/password-reset-confirm/:
    post:
      operationId: accounts_password_reset_confirm_create
      description: Confirm password reset using UID, Token, and new password.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/payments/confirm/{id}/:
    post:
      operationId: accounts_payments_confirm_create
      description: Owner confirms or rejects a payment.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
