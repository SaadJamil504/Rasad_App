  /api/accounts/routes/{id}/reorder/:
    post:
      operationId: accounts_routes_reorder_create
      description: Reorder customers within a route.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      requestBody:
        content:
          ordered_ids:
            schema:
              type: object
              additionalProperties: {}
              description: Unspecified request body
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/accounts/signup/:
