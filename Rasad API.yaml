components:
  schemas:
    AdjustmentTypeEnum:
      enum:
      - pause
      - quantity
      - complaint
      type: string
      description: |-
        * `pause` - Pause Delivery
        * `quantity` - Change Quantity
        * `complaint` - Complaint
    BlankEnum:
      enum:
      - ''
    Complaint:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        subject:
          type: string
          maxLength: 255
        description:
          type: string
        is_resolved:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - id
      - subject
    Customer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          nullable: true
        full_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          maxLength: 15
        route:
          type: integer
        route_name:
          type: string
          readOnly: true
        milk_type:
          $ref: '#/components/schemas/CustomerMilkTypeEnum'
        daily_qty:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          description: Quantity in liters
        rate_per_liter:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/CustomerStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - daily_qty
      - full_name
      - id
      - phone_number
      - rate_per_liter
      - route
      - route_name
    CustomerMilkTypeEnum:
      enum:
      - buffalo
      - cow
      type: string
      description: |-
        * `buffalo` - Buffalo
        * `cow` - Cow
    CustomerStatusEnum:
      enum:
      - active
      - paused
      type: string
      description: |-
        * `active` - Active
        * `paused` - Paused
    Delivery:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer:
          type: integer
        customer_name:
          type: string
          readOnly: true
        customer_username:
          type: string
          readOnly: true
        customer_house_no:
          type: string
          readOnly: true
        customer_street:
          type: string
          readOnly: true
        customer_area:
          type: string
          readOnly: true
        customer_city:
          type: string
          readOnly: true
        customer_latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,16})?$
          readOnly: true
        customer_longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,16})?$
          readOnly: true
        customer_milk_type:
          type: string
          readOnly: true
        customer_quantity:
          type: string
          readOnly: true
        route:
          type: integer
          nullable: true
        date:
          type: string
          format: date
        is_delivered:
          type: boolean
        status:
          $ref: '#/components/schemas/DeliveryStatusEnum'
        delivered_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        price_at_delivery:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total_amount:
          type: string
