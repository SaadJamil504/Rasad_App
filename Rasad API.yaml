      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
  /api/accounts/payments/list/:
    get:
      operationId: accounts_payments_list_list
      description: List payments. Owners see pending payments from their customers.
        Customers see their own history.
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
          description: ''
  /api/accounts/payments/report/:
    post:
      operationId: accounts_payments_report_create
