          description: ''
  /api/accounts/routes/:
    get:
      operationId: accounts_routes_retrieve
      description: List or create delivery routes (Owner only).
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
          description: ''
    post:
      operationId: accounts_routes_create
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/accounts/routes/{id}/:
    get:
      operationId: accounts_routes_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: accounts_routes_update
      parameters:
      - in: path
        name: id
